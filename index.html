<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EjderMC | Merkezi Uptime</title>
    <style>
        body { background: #000; color: #00fbff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { text-align: center; border: 2px solid #00fbff; padding: 50px; border-radius: 30px; box-shadow: 0 0 40px rgba(0, 251, 255, 0.2); }
        #timer { font-size: 5rem; font-weight: bold; text-shadow: 0 0 20px #00fbff; font-family: monospace; }
        .text { color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <div class="text">Sistem Aktiflik Süresi</div>
        <div id="timer">00:00:00</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Senin resimdeki bilgilerini buraya işledim
        const firebaseConfig = {
            apiKey: "AIzaSyDvVy9wAgsZEOZEXLkz3s-0Nq7LqsWUZOA",
            authDomain: "server-af41f.firebaseapp.com",
            projectId: "server-af41f",
            storageBucket: "server-af41f.firebasestorage.app",
            messagingSenderId: "194089980508",
            appId: "1:194089980508:web:f27dd26e549c68ee1d4c99"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "uptime", "status");

        // BOT DÜRTME: Linkin sonuna ?ping=true eklersen süre herkes için sıfırlanır
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('ping') === 'true') {
            setDoc(docRef, { last_ping: Date.now() }, { merge: true });
        }

        let lastPing = 0;

        // CANLI VERİ: Firebase'den süreyi çek (Herkes aynı veriyi alır)
        onSnapshot(docRef, (doc) => {
            if (doc.exists()) {
                lastPing = doc.data().last_ping;
            }
        });

        // EKRAN GÜNCELLEME: Saniyeyi saydır
        setInterval(() => {
            if (!lastPing) return;
            
            const diff = Math.floor((Date.now() - lastPing) / 1000);
            const h = Math.floor(diff / 3600).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        }, 1000);

        // Sayfa yenilense de süre bozulmaz, çünkü veri Firebase'de!
    </script>
</body>
</html>
