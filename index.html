<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EjderMC | Uptime Monitor</title>
    <style>
        body {
            background-color: #050505;
            color: #00d2ff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            border: 2px solid #00d2ff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 1rem;
            letter-spacing: 3px;
            color: #fff;
            margin-bottom: 20px;
        }

        #timer {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 20px #00d2ff;
            font-family: 'Courier New', monospace;
        }

        .status {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SİSTEM ÇALIŞMA SÜRESİ</h1>
        <div id="timer">00:00:00</div>
        <div class="status" id="status-text">Veri bekleniyor...</div>
    </div>

    <script type="module">
        // Firebase Modüllerini Yüklüyoruz
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Senin verdiğin Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDvVy9wAgsZEOZEXLkz3s-0Nq7LqsWUZOA",
            authDomain: "server-af41f.firebaseapp.com",
            projectId: "server-af41f",
            databaseURL: "https://server-af41f-default-rtdb.europe-west1.firebasedatabase.app", // NOT: Database URL'ini Firebase panelinden kontrol et, genelde budur.
            storageBucket: "server-af41f.firebasestorage.app",
            messagingSenderId: "194089980508",
            appId: "1:194089980508:web:f27dd26e549c68ee1d4c99"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const uptimeRef = ref(db, 'last_ping');

        // 1. DÜRTME MANTIĞI: Eğer linkin sonuna ?ping=true eklersen sayaç sıfırlanır
        // C++ botun bu adresi çağırmalı: https://siten.vercel.app/?ping=true
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('ping') === 'true') {
            set(uptimeRef, Date.now());
            document.getElementById('status-text').innerText = "Sistem dürtüldü!";
        }

        // 2. VERİ ÇEKME MANTIĞI: Firebase'deki süreyi herkes için aynı anda çeker
        let lastPingTime = 0;
        onValue(uptimeRef, (snapshot) => {
            lastPingTime = snapshot.val();
            document.getElementById('status-text').innerText = "Canlı veri bağlandı.";
        });

        // 3. EKRAN GÜNCELLEME: Saniyeyi saniye saniye arttırır
        setInterval(() => {
            if (!lastPingTime) return;

            const now = Date.now();
            const diff = Math.floor((now - lastPingTime) / 1000);

            const h = Math.floor(diff / 3600).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');

            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        }, 1000);
    </script>
</body>
</html>
