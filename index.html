<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Sayacı</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00d2ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            border: 2px solid #00d2ff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px #00d2ff88;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #counter {
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px #00d2ff;
        }

        .label {
            color: #fff;
            font-size: 0.9rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SİTE DURUMU</h1>
        <div id="counter">00:00:00</div>
        <div class="label">Önce Aktif Edildi</div>
    </div>

    <script>
        // Sayfanın yüklendiği anı milisaniye olarak alıyoruz
        const loginTime = new Date().getTime();

        function updateCounter() {
            const currentTime = new Date().getTime();
            const difference = currentTime - loginTime;

            // Milisaniyeyi saniye, dakika ve saate çevirme
            let seconds = Math.floor((difference / 1000) % 60);
            let minutes = Math.floor((difference / (1000 * 60)) % 60);
            let hours = Math.floor((difference / (1000 * 60 * 60)) % 24);

            // Sayıları 00 şeklinde formatlama
            const format = (num) => num < 10 ? '0' + num : num;

            // Ekrana yazdırma
            document.getElementById('counter').innerText = 
                format(hours) + ":" + format(minutes) + ":" + format(seconds);
        }

        // Her 1 saniyede (1000ms) bir güncelle
        setInterval(updateCounter, 1000);
    </script>
</body>
</html>
